<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const def = `erDiagram
  USERS ||--o| DOCTOR_PROFILES : has
  DOCTOR_PROFILES ||--o{ PATIENTS : creates
  DOCTOR_PROFILES ||--o{ EXAMINATIONS : performs
  PATIENTS ||--o{ EXAMINATIONS : has
  EXAMINATIONS ||--o{ LESION_IMAGES : contains
  LESION_IMAGES ||--o| IMAGE_METADATA : has
  LESION_IMAGES ||--o{ AI_PREDICTIONS : analyzed_by
  AI_PREDICTIONS ||--o{ AI_PREDICTION_DETAILS : has
  AI_PREDICTIONS ||--o{ AI_HEATMAPS : has
  EXAMINATIONS ||--o{ DOCTOR_REPORTS : concludes
  DOCTOR_REPORTS ||--o{ REPORT_PREDICTION_REFS : references
  AI_PREDICTIONS ||--o{ REPORT_PREDICTION_REFS : referenced_by
  EXAMINATIONS ||--o{ CONSENT_RECORDS : has
  USERS ||--o{ AUDIT_LOGS : generates

  USERS {
    int user_id PK
    string username
    string password_hash
    string role
  }
  DOCTOR_PROFILES {
    int doctor_id PK
    int user_id FK
    string fullname
    string hospital
    string department
  }
  PATIENTS {
    int patient_id PK
    string patient_code
    int created_by_doctor FK
    string fullname
    int birth_year
  }
  EXAMINATIONS {
    int exam_id PK
    int patient_id FK
    int doctor_id FK
    date exam_date
    string chief_complaint
  }
  LESION_IMAGES {
    int image_id PK
    int exam_id FK
    string image_path
    float blur_score
    float quality_score
  }
  IMAGE_METADATA {
    int metadata_id PK
    int image_id FK
    int age
    string lesion_location
    string skin_type
  }
  AI_PREDICTIONS {
    int prediction_id PK
    int image_id FK
    string model_name
    string model_version
  }
  AI_PREDICTION_DETAILS {
    int detail_id PK
    int prediction_id FK
    int rank
    string predicted_class
    float confidence
  }
  AI_HEATMAPS {
    int heatmap_id PK
    int prediction_id FK
    string heatmap_path
  }
  DOCTOR_REPORTS {
    int report_id PK
    int exam_id FK
    int doctor_id FK
    string diagnosis
    string status
  }
  REPORT_PREDICTION_REFS {
    int id PK
    int report_id FK
    int prediction_id FK
  }
  CONSENT_RECORDS {
    int consent_id PK
    int exam_id FK
    string purpose
    int granted_by FK
  }
  AUDIT_LOGS {
    int log_id PK
    int user_id FK
    string action
    string target_table
  }
`;
const { svg } = await mermaid.render('erd-svg', def);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
